{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-[#0f2027] via-[#1c2b35] to-[#2c5364] text-white py-16 px-6">
  <div class="max-w-4xl mx-auto">

    <div class="text-center mb-16">
      <h1 class="text-5xl font-extrabold bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent">
        🧠 AI Career Quiz
      </h1>
      <p class="text-white/60 mt-4 text-lg">
        Answer thoughtfully and unlock your personalized AI career insight
      </p>
    </div>

    <form method="POST" class="space-y-10">
      {% csrf_token %}

      {% for q in questions %}
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-xl hover:shadow-cyan-400/20 transition duration-300">
          <h3 class="text-xl md:text-2xl font-bold mb-6">
            <span class="text-cyan-300">{{ forloop.counter }}.</span>
            {{ q.question }}
          </h3>

          <div class="space-y-4">
            {% for opt in q.options.all %}
              <label class="group flex items-center gap-4 p-4 rounded-2xl border border-white/20 bg-white/5 hover:bg-cyan-500/10 hover:border-cyan-400 cursor-pointer transition-all duration-300">
                <input type="radio" name="question_{{ q.id }}" value="{{ opt.id }}" class="w-5 h-5 accent-cyan-400" required>
                <span class="text-white/90 group-hover:text-cyan-300 transition">{{ opt.option_text }}</span>
              </label>
            {% endfor %}
          </div>
        </div>
      {% endfor %}

      <div class="text-center pt-6">
        <button type="submit" class="px-12 py-4 rounded-3xl bg-gradient-to-r from-cyan-400 to-blue-500 text-gray-900 font-bold text-lg shadow-2xl hover:scale-105 hover:shadow-cyan-400/40 transition duration-300">
          🚀 Generate My Career Result
        </button>
      </div>
    </form>

  </div>
</div>

{% endblock %}
