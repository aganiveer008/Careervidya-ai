{% extends 'accounts/base.html' %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-red-500 via-pink-500 to-purple-600">

  <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full text-center animate-fade-in">

    <!-- ❌ ICON -->
    <div class="flex justify-center mb-6">
      <div class="bg-red-100 p-4 rounded-full">
        <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" stroke-width="3"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>
    </div>

    <!-- ❌ TITLE -->
    <h2 class="text-3xl font-bold text-gray-800 mb-3">
      Invalid or Expired Link ❌
    </h2>

    <!-- 💬 MESSAGE -->
    <p class="text-gray-600 mb-6">
      This verification link is either invalid or has expired.<br>
      Please register again or request a new verification email.
    </p>

    <!-- 🔁 BUTTON -->
    <a href="/register/"
       class="inline-block px-6 py-3 bg-red-500 text-white rounded-xl font-semibold shadow-md hover:bg-red-600 transition transform hover:scale-105">
       Register Again →
    </a>

    <!-- 🔐 FOOTER -->
    <p class="text-sm text-gray-400 mt-6">
      Need help? Contact support anytime 💬
    </p>

  </div>

</div>

<style>
.animate-fade-in {
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

{% endblock %}
