<h2>Career Quiz</h2>

<form method="POST">
    {% csrf_token %}

    {% for question in questions %}
        <div>
            <p><strong>{{ question.question }}</strong></p>

            {% for option in question.careerquizoption_set.all %}
                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ option.id }}">
                    {{ option.option_text }}
                </label><br>
            {% endfor %}
        </div>
        <hr>
    {% endfor %}

    <button type="submit">Submit</button>
</form>
