{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0b1d26] via-[#132a33] to-[#1c3c47] px-4">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-10 text-center shadow-2xl">

    <!-- Icon -->
    <div class="text-5xl mb-4">📧</div>

    <!-- Heading -->
    <h2 class="text-3xl font-bold text-green-400 mb-4">
      Check your email
    </h2>

    <!-- Message -->
    <p class="text-white/70 text-sm leading-relaxed mb-6">
      If an account exists with the email you entered,  
      you will receive a password reset link shortly.
      <br><br>
      Please check your inbox or spam folder.
    </p>

    <!-- Divider -->
    <div class="w-full h-px bg-white/20 my-6"></div>

    <!-- Login Button -->
    <a href="{% url 'login' %}"
       class="inline-block w-full py-3 rounded-xl bg-cyan-400 text-black font-bold hover:bg-cyan-300 transition duration-300 shadow-lg hover:scale-[1.02]">
      🔐 Back to Login
    </a>

  </div>
</div>

{% endblock %}
