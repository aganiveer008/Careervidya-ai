{% extends 'accounts/admin/dashboard.html' %}

{% block content %}
<div class="max-w-3xl mx-auto p-6 bg-gray-800 rounded-lg text-white mt-6">
    <h2 class="text-2xl font-bold text-cyan-400 mb-4">Edit Career Quiz Question 🧪</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Question -->
        <div class="mb-4">
            <label class="block mb-1 font-semibold">Question</label>
            <input type="text" name="question" class="w-full p-2 rounded bg-gray-700" value="{{ question.question }}" required>
        </div>

        {% for opt in options %}
<div class="mb-4 p-3 bg-gray-700 rounded">

    <label class="block mb-1 font-semibold">
        Option {{ forloop.counter }}
    </label>

    <!-- Option Text -->
    <input type="text"
           name="option{{ forloop.counter }}_text"
           value="{{ opt.option_text }}"
           class="w-full p-2 rounded bg-gray-800"
           required>

    <!-- Weight -->
    <input type="number"
           name="option{{ forloop.counter }}_weight"
           value="{{ opt.weight }}"
           class="w-full p-2 rounded bg-gray-800 mt-2"
           required>

    <!-- ✅ Category Dropdown -->
    <select name="option{{ forloop.counter }}_category"
            class="w-full p-2 rounded bg-gray-800 mt-2"
            required>
        <option value="">Select Category</option>

        {% for cat in categories %}
            <option value="{{ cat.id }}"
                {% if opt.category and opt.category.id == cat.id %}
                    selected
                {% endif %}
            >
                {{ cat.name }}
            </option>
        {% endfor %}

    </select>

</div>
{% endfor %}

{% endblock %}
