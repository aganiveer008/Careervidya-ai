{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0b1d26] via-[#132a33] to-[#1c3c47] px-4">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-10 shadow-2xl">

    <h2 class="text-3xl font-bold text-pink-300 text-center mb-6">
      Set New Password 🔑
    </h2>

    <form method="post" class="space-y-5">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit"
        class="w-full py-3 rounded-xl bg-pink-400 text-black font-bold hover:bg-pink-300 transition">
        Reset Password
      </button>
    </form>

  </div>
</div>

{% endblock %}
