{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0b1d26] via-[#132a33] to-[#1c3c47] px-4">

  <div class="max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-10 text-center shadow-2xl">

    <h2 class="text-3xl font-bold text-green-400 mb-4">
      Password Reset Successful 🎉
    </h2>

    <p class="text-white/70 mb-6">
      Your password has been updated successfully.
    </p>

    <a href="{% url 'login' %}"
       class="inline-block px-6 py-3 rounded-xl bg-cyan-400 text-black font-bold hover:bg-cyan-300 transition">
      Login Now
    </a>

  </div>
</div>

{% endblock %}
