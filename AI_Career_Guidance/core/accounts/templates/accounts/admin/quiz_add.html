{% extends 'accounts/admin/dashboard.html' %}

{% block content %}
<div class="max-w-3xl mx-auto p-6 bg-gray-800 rounded-lg text-white mt-6">
    <h2 class="text-2xl font-bold text-cyan-400 mb-4">
        Add Career Quiz Question 🧪
    </h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Question -->
        <div class="mb-6">
            <label class="block mb-1 font-semibold">Question</label>
            <input type="text"
                   name="question"
                   class="w-full p-2 rounded bg-gray-700"
                   required>
        </div>

        <!-- OPTION 1 -->
        <div class="mb-4 bg-gray-700 p-4 rounded">
            <label class="block mb-2 font-semibold text-cyan-300">Option 1</label>

            <input type="text"
                   name="option1_text"
                   placeholder="Option text"
                   class="w-full p-2 rounded bg-gray-800 mb-2"
                   required>

            <select name="option1_category"
                    class="w-full p-2 rounded bg-gray-800 mb-2"
                    required>
                <option value="">Select Category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>

            <input type="number"
                   name="option1_weight"
                   placeholder="Weight (1-5)"
                   value="1"
                   min="1"
                   class="w-full p-2 rounded bg-gray-800"
                   required>
        </div>

        <!-- OPTION 2 -->
        <div class="mb-4 bg-gray-700 p-4 rounded">
            <label class="block mb-2 font-semibold text-cyan-300">Option 2</label>

            <input type="text"
                   name="option2_text"
                   placeholder="Option text"
                   class="w-full p-2 rounded bg-gray-800 mb-2"
                   required>

            <select name="option2_category"
                    class="w-full p-2 rounded bg-gray-800 mb-2"
                    required>
                <option value="">Select Category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>

            <input type="number"
                   name="option2_weight"
                   placeholder="Weight (1-5)"
                   value="1"
                   min="1"
                   class="w-full p-2 rounded bg-gray-800"
                   required>
        </div>

        <!-- OPTION 3 -->
        <div class="mb-6 bg-gray-700 p-4 rounded">
            <label class="block mb-2 font-semibold text-cyan-300">Option 3</label>

            <input type="text"
                   name="option3_text"
                   placeholder="Option text"
                   class="w-full p-2 rounded bg-gray-800 mb-2"
                   required>

            <select name="option3_category"
                    class="w-full p-2 rounded bg-gray-800 mb-2"
                    required>
                <option value="">Select Category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>

            <input type="number"
                   name="option3_weight"
                   placeholder="Weight (1-5)"
                   value="1"
                   min="1"
                   class="w-full p-2 rounded bg-gray-800"
                   required>
        </div>

        <!-- Buttons -->
        <button type="submit"
                class="bg-cyan-500 px-6 py-2 rounded hover:bg-cyan-600">
            Add Question
        </button>

        <a href="{% url 'admin_quiz_list' %}"
           class="ml-4 bg-gray-600 px-4 py-2 rounded hover:bg-gray-700">
            Cancel
        </a>

    </form>
</div>
{% endblock %}
