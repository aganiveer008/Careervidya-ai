{% extends 'accounts/base.html' %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500">

  <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full text-center animate-fade-in">

    <!-- ✅ ICON -->
    <div class="flex justify-center mb-6">
      <div class="bg-green-100 p-4 rounded-full">
        <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" stroke-width="3"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M5 13l4 4L19 7"/>
        </svg>
      </div>
    </div>

    <!-- 🎉 TITLE -->
    <h2 class="text-3xl font-bold text-gray-800 mb-3">
      Account Verified 🎉
    </h2>

    <!-- 👋 MESSAGE -->
    <p class="text-gray-600 mb-6">
      Hello <span class="font-semibold text-indigo-600">{{ user.first_name }}</span>,<br>
      Your account has been successfully verified.
    </p>

    <!-- 🚀 BUTTON -->
    <a href="/login/"
       class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-xl font-semibold shadow-md hover:bg-indigo-700 transition transform hover:scale-105">
       Login Now →
    </a>
    <p class="mt-4 text-sm text-gray-500">
  Didn’t expect this? <a href="{% url 'contact' %}" class="text-indigo-600 hover:underline">Contact Support</a>
</p>

    <!-- 🔐 FOOTER -->
    <p class="text-sm text-gray-400 mt-6">
      Secure access powered by CareerVidya AI
    </p>

  </div>

</div>

<style>
.animate-fade-in {
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

{% endblock %}
