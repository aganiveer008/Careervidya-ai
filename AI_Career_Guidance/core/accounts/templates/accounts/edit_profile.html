{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-[#0f2027] via-[#203a43] to-[#2c5364] flex items-center justify-center px-4">

  <div class="w-full max-w-2xl bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-10 text-white">

    <div class="text-center mb-10">
      <h2 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
        Update Your Profile
      </h2>
    </div>

    <form method="POST" class="space-y-8">
      {% csrf_token %}

      <!-- 🔥 CATEGORY -->
      <div>
        <label class="block mb-2 font-semibold text-cyan-300">
          🎯 Select Interest
        </label>

        <select id="category-dropdown" name="interest"
                class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white">
          
          <option value="" class="text-white bg-black">-- Select your Interest --</option>

          {% for cat in categories %}
            <option value="{{ cat.id }}" class="text-black"
              {% if profile.interest == cat.id|stringformat:"s" %}selected{% endif %}>
              {{ cat.name }}
            </option>
          {% endfor %}

        </select>
      </div>

      <!-- 🔥 SKILLS -->
      <div>
        <div class="flex justify-between items-center mb-3">
          <label class="font-semibold text-cyan-300">
            🛠 Select Skills
          </label>

          <button type="button"
                  id="clear-skills"
                  class="text-sm bg-red-500/20 text-red-300 px-3 py-1 rounded-lg">
            Clear All
          </button>
        </div>

        <select id="skills-dropdown"
                name="skills"
                multiple
                class="w-full text-black rounded-lg">

          {% for skill in skills %}
            <option value="{{ skill.id }}"
                    data-category="{{ skill.category.id|default:'' }}"
                    {% if skill.id in student_skill_ids %}selected{% endif %}>
              {{ skill.name }}
            </option>
          {% endfor %}

        </select>
      </div>

      <!-- BUTTONS -->
      <div class="flex gap-4 pt-4">

        <button type="submit"
          class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-gray-900 font-bold py-3 rounded-xl">
          Save Profile
        </button>

        <a href="{% url 'dashboard' %}"
           class="w-full text-center bg-white/10 border border-white/20 py-3 rounded-xl">
          Cancel
        </a>

      </div>

    </form>

  </div>
</div>

<!-- 🔥 SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function() {

  const categoryDropdown = document.getElementById("category-dropdown");

  // 🔥 INIT TOMSELECT
  const select = new TomSelect("#skills-dropdown", {
      plugins: ['remove_button'],
      placeholder: "Select skills...",
  });

  // 🔥 STORE ALL SKILLS (IMPORTANT FIX)
  const allSkills = [];

  document.querySelectorAll("#skills-dropdown option").forEach(option => {
      allSkills.push({
          value: option.value,
          text: option.text,
          category: option.getAttribute("data-category")
      });
  });

  // 🔥 FILTER FUNCTION (REAL FIX)
  categoryDropdown.addEventListener("change", function() {

      const selectedCategory = this.value;

      select.clear();
      select.clearOptions();

      allSkills.forEach(skill => {

          if (!selectedCategory || skill.category === selectedCategory) {
              select.addOption({
                  value: skill.value,
                  text: skill.text
              });
          }

      });

      select.refreshOptions(false);
  });

  // 🔥 CLEAR BUTTON
  document.getElementById("clear-skills").addEventListener("click", function() {
      select.clear();
  });

});
</script>

{% endblock %}
