{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0f2027] via-[#1c2b35] to-[#2c5364] p-6">

  <div class="w-full max-w-3xl bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl p-8 md:p-10">

    <!-- Heading -->
    <div class="text-center mb-8">
      <h2 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent">
        ✨ Edit Profile
      </h2>
      <p class="text-white/60 mt-2">
        Update your personal and academic information
      </p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-8">
      {% csrf_token %}

      <!-- PROFILE IMAGE -->
      <div class="flex flex-col items-center">

        {% if profile.profile_picture %}
          <img id="profilePreview"
               src="{{ profile.profile_picture.url }}"
               class="w-32 h-32 rounded-full object-cover border-4 border-cyan-400 shadow-xl mb-4">

          <label class="flex items-center gap-2 text-red-400 text-sm mb-4 cursor-pointer">
            <input type="checkbox" name="remove_photo" class="accent-red-500">
            Remove current photo
          </label>

        {% else %}
          <div id="profilePreview"
               class="w-32 h-32 rounded-full bg-white/10 flex items-center justify-center border border-white/20 mb-4 text-white/50">
            No Image
          </div>
        {% endif %}

        <label class="cursor-pointer bg-cyan-500/20 border border-cyan-400 text-cyan-300 px-4 py-2 rounded-xl text-sm hover:bg-cyan-500/30 transition">
          Change Photo
          <input type="file" name="profile_picture" class="hidden">
        </label>

      </div>

      <!-- BASIC INFO -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- First Name -->
        <div>
          <label class="text-white/60 text-sm">First Name</label>
          <input type="text" name="first_name" value="{{ user.first_name }}"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

        <!-- Last Name -->
        <div>
          <label class="text-white/60 text-sm">Last Name</label>
          <input type="text" name="last_name" value="{{ user.last_name }}"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

        <!-- Email -->
        <div class="md:col-span-2">
          <label class="text-white/60 text-sm">Email</label>
          <input type="email" name="email" value="{{ user.email }}"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

      </div>

      <!-- EDUCATION & STREAM -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Education Level -->
        <div>
          <label class="text-white/60 text-sm">Education Level</label>
          <select id="education_level" name="education_level"
                  class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-black focus:ring-2 focus:ring-cyan-400">
            <option value="">Select</option>
            <option value="10th" {% if profile.education_level|default_if_none:"" == "10th" %}selected{% endif %}>10th</option>
            <option value="12th" {% if profile.education_level|default_if_none:"" == "12th" %}selected{% endif %}>12th</option>
            <option value="graduate" {% if profile.education_level|default_if_none:"" == "graduate" %}selected{% endif %}>Graduate</option>
            <option value="postgraduate" {% if profile.education_level|default_if_none:"" == "postgraduate" %}selected{% endif %}>Post Graduate</option>
          </select>
        </div>

        <!-- Stream -->
        <div id="stream_div">
          <label class="text-white/60 text-sm">Stream</label>
          <select name="stream"
                  class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-black focus:ring-2 focus:ring-cyan-400">
            <option value="">Select</option>
            <option value="arts" {% if profile.stream|default_if_none:"" == "arts" %}selected{% endif %}>Arts</option>
            <option value="commerce" {% if profile.stream|default_if_none:"" == "commerce" %}selected{% endif %}>Commerce</option>
            <option value="medical" {% if profile.stream|default_if_none:"" == "medical" %}selected{% endif %}>Medical</option>
            <option value="non-medical" {% if profile.stream|default_if_none:"" == "non-medical" %}selected{% endif %}>Non Medical</option>
            <option value="other" {% if profile.stream|default_if_none:"" == "other" %}selected{% endif %}>Other</option>
          </select>
        </div>

        <!-- Graduation Field -->
        <div id="grad_div">
          <label class="text-white/60 text-sm">Graduation Field</label>
          <input type="text" name="graduation_field" value="{{ profile.graduation_field|default_if_none:"" }}"
                 placeholder="e.g. Computer Science"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

        <!-- Post Graduation Field -->
        <div id="pg_div">
          <label class="text-white/60 text-sm">Post Graduation Field</label>
          <input type="text" name="post_graduation_field" value="{{ profile.post_graduation_field|default_if_none:"" }}"
                 placeholder="e.g. AI & ML"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

        <!-- Location Preference -->
        <div>
          <label class="text-white/60 text-sm">Location Preference</label>
          <input type="text" name="location_preference" value="{{ profile.location_preference|default_if_none:"" }}"
                 placeholder="Preferred location"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

        <!-- Career Interest -->
        <div>
          <label class="text-white/60 text-sm">Career Interest</label>
          <input type="text" name="interest" value="{{ profile.interest|default_if_none:"" }}"
                 placeholder="e.g. AI, Web Development, Data Science"
                 class="w-full mt-2 px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-cyan-400">
        </div>

      </div>

      <!-- BUTTONS -->
      <div class="flex flex-col md:flex-row gap-4 pt-4">

        <button type="submit"
                class="w-full md:w-1/2 bg-gradient-to-r from-cyan-400 to-blue-500 py-3 rounded-xl font-semibold text-white shadow-lg hover:scale-105 transition">
          💾 Save Changes
        </button>

        <a href="{% url 'dashboard' %}"
           class="w-full md:w-1/2 text-center bg-white/10 border border-white/20 py-3 rounded-xl font-semibold text-white hover:bg-white/20 transition">
          Cancel
        </a>

      </div>

    </form>

  </div>

</div>

<script>
  const eduSelect = document.getElementById("education_level");
  const streamDiv = document.getElementById("stream_div");
  const gradDiv = document.getElementById("grad_div");
  const pgDiv = document.getElementById("pg_div");

  function updateEducationFields() {
    const val = eduSelect.value;
    if (val === "10th" || val === "12th") {
      streamDiv.classList.remove("hidden");
      gradDiv.classList.add("hidden");
      pgDiv.classList.add("hidden");
    } else if (val === "graduate") {
      streamDiv.classList.add("hidden");
      gradDiv.classList.remove("hidden");
      pgDiv.classList.add("hidden");
    } else if (val === "postgraduate") {
      streamDiv.classList.add("hidden");
      gradDiv.classList.remove("hidden");
      pgDiv.classList.remove("hidden");
    } else {
      streamDiv.classList.add("hidden");
      gradDiv.classList.add("hidden");
      pgDiv.classList.add("hidden");
    }
  }

  // On page load
  updateEducationFields();

  // On change
  eduSelect.addEventListener("change", updateEducationFields);
</script>

{% endblock %}
