{% extends "accounts/admin/base_admin.html" %}

{% block content %}
<div class="space-y-8">

  <!-- Header -->
  <div class="flex flex-col md:flex-row items-center justify-between mb-6">
    <h2 class="text-3xl font-bold text-gray-100 mb-4 md:mb-0">
      Edit Category: {{ category.name }}
    </h2>
  </div>

  <!-- Edit Category Card -->
  <div class="bg-gray-800 shadow-2xl rounded-2xl p-6 border border-gray-700 max-w-3xl mx-auto">
    <h3 class="text-2xl font-semibold text-cyan-400 mb-4">Update Category</h3>

    <form method="POST" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}

      <!-- Quick CSS fix for inputs to be visible on dark bg -->
      <style>
        form input, form textarea, form select {
          background-color: #1f2937; /* Tailwind bg-gray-800 slightly darker */
          color: white;              /* Text visible */
          padding: 0.5rem 1rem;      /* Tailwind px-4 py-2 */
          border-radius: 0.75rem;    /* Tailwind rounded-lg */
          outline: none;
          border: 1px solid #374151; /* Tailwind border-gray-700 */
        }
        form input::placeholder,
        form textarea::placeholder {
          color: #d1d5db; /* Tailwind gray-300 */
        }
      </style>

      <button type="submit"
              class="w-full md:w-auto bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:scale-105 transition transform">
        Update
      </button>
    </form>
  </div>

</div>
{% endblock %}
