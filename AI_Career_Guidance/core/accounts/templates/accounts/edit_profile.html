{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-[#0f2027] via-[#203a43] to-[#2c5364] flex items-center justify-center px-4">

  <div class="w-full max-w-2xl bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.4)] p-10 text-white transform transition duration-700 hover:scale-[1.01] animate-fadeIn">

    <div class="text-center mb-10">
      <h2 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
        Update Your Profile
      </h2>
      <p class="text-white/60 mt-3">
        Improve your AI career recommendations
      </p>
    </div>

    <form method="POST" class="space-y-8" id="profile-form">
      {% csrf_token %}

      <!-- Interest -->
      <div class="relative">
        <label class="block mb-2 font-semibold text-cyan-300">
          🎯 Primary Interest
        </label>

        <input
          name="interest"
          id="interest"
          required
          value="{{ profile.interest }}"
          placeholder="Enter your main interest..."
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 text-white placeholder-white/40 transition duration-300"
        >

        <p id="interest-error" class="text-red-400 text-sm mt-2 hidden">
          Please enter your primary interest.
        </p>
      </div>

      <!-- Skills -->
      <div>
        <div class="flex justify-between items-center mb-3">
          <label class="font-semibold text-cyan-300">
            🛠 Select Your Skills
          </label>

          <button type="button"
                  id="clear-skills"
                  class="text-sm bg-red-500/20 hover:bg-red-500/40 text-red-300 px-3 py-1 rounded-lg transition duration-300">
            Clear All
          </button>
        </div>

        <select id="skills-dropdown"
                name="skills"
                multiple
                required
                class="w-full text-black rounded-lg">

          {% for skill in skills %}
            <option value="{{ skill.id }}"
              {% if skill.id in student_skill_ids %}selected{% endif %}>
              {{ skill.name }}
            </option>
          {% endfor %}

        </select>

        <p id="skills-error" class="text-red-400 text-sm mt-2 hidden">
          Please select at least one skill.
        </p>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-4">

        <button type="submit"
          class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-blue-500 hover:to-cyan-400 text-gray-900 font-bold py-3 rounded-xl transition duration-300 shadow-lg hover:shadow-cyan-500/40 hover:scale-105">
          Save Profile
        </button>

        <a href="{% url 'dashboard' %}"
           class="w-full text-center bg-white/10 hover:bg-white/20 border border-white/20 py-3 rounded-xl transition duration-300 hover:scale-105">
          Cancel
        </a>

      </div>

    </form>

  </div>
</div>

<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fadeIn {
  animation: fadeIn 0.8s ease forwards;
}

.shake {
  animation: shake 0.4s;
}
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const form = document.getElementById("profile-form");
  const interestInput = document.getElementById("interest");
  const interestError = document.getElementById("interest-error");
  const skillsError = document.getElementById("skills-error");

  const select = new TomSelect("#skills-dropdown", {
      plugins: ['remove_button'],
      placeholder: "Search & select your skills...",
      maxOptions: 500,
      create: false,
      hideSelected: true,
      closeAfterSelect: false,
  });

  document.getElementById("clear-skills").addEventListener("click", function() {
      select.clear();
  });

  form.addEventListener("submit", function(e) {

      let valid = true;

      interestError.classList.add("hidden");
      skillsError.classList.add("hidden");
      interestInput.classList.remove("border-red-500");

      if (!interestInput.value.trim()) {
          interestError.classList.remove("hidden");
          interestInput.classList.add("border-red-500", "shake");
          valid = false;
      }

      if (select.getValue().length === 0) {
          skillsError.classList.remove("hidden");
          valid = false;
      }

      if (!valid) {
          e.preventDefault();
      }
  });

});
</script>

{% endblock %}
